# =============================================================================
# DalyBMS — Stack complète Docker Compose
# =============================================================================
# Inclut : Mosquitto · InfluxDB · Grafana · daly-bms-server (simulé)
#
# Prérequis :
#   cp .env.docker .env && nano .env   # adapter les secrets
#
# Démarrage :
#   docker compose up -d
#   docker compose logs -f dalybms-server
#
# URLs après démarrage :
#   API REST   → http://localhost:8000/api/v1/bms
#   WebSocket  → ws://localhost:8000/ws/bms/stream
#   Grafana    → http://localhost:3001  (admin / GRAFANA_ADMIN_PASSWORD)
#   InfluxDB   → http://localhost:8086
#   Node-RED   → http://localhost:1880
#
# Mode hardware réel (Pi) :
#   Remplacer CMD dans le service dalybms-server par [] et ajouter :
#     devices:
#       - /dev/ttyUSB0:/dev/ttyUSB0
#   Puis : docker compose up -d dalybms-server

# =============================================================================
# Services
# =============================================================================
services:

  # ── Broker MQTT ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: dalybms-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t '$$health' -m ok -q 0 && echo ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dalybms-net

  # ── Base de données temporelle ───────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7.10
    container_name: dalybms-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:     setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-supersecret123}
      DOCKER_INFLUXDB_INIT_ORG:      ${INFLUX_ORG:-santuario}
      DOCKER_INFLUXDB_INIT_BUCKET:   ${INFLUX_BUCKET:-daly_bms}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:?INFLUX_TOKEN manquant dans .env}
      # Rétention par défaut du bucket : 30 jours
      DOCKER_INFLUXDB_INIT_RETENTION: 720h
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dalybms-net

  # ── Visualisation Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: dalybms-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD manquant dans .env}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      # Passer le token InfluxDB pour le provisioning datasource
      INFLUX_TOKEN:               ${INFLUX_TOKEN}
      INFLUX_ORG:                 ${INFLUX_ORG:-santuario}
      INFLUX_BUCKET:              ${INFLUX_BUCKET:-daly_bms}
      # Plugins supplémentaires (séparés par des virgules)
      GF_INSTALL_PLUGINS:         ""
      # Timezone
      GF_DEFAULT_TIMEZONE:        "browser"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dalybms-net

  # ── Serveur BMS Rust (mode simulation) ──────────────────────────────────────
  dalybms-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: dalybms-server:latest
    container_name: dalybms-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RUST_LOG:       ${RUST_LOG:-info}
      DALY_CONFIG:    /etc/daly-bms/config.toml
      DALY_API_KEY:   ${DALY_API_KEY:-}
    volumes:
      # Config Docker (MQTT=mosquitto, InfluxDB=dalybms-influxdb)
      # Pour hardware réel, monter Config.toml à la place
      - ./Config.docker.toml:/etc/daly-bms/config.toml:ro
      # Journal des alertes SQLite
      - dalybms-alerts:/var/lib/daly-bms
    # Mode hardware réel — autodétection du port COM
    command: []
    devices:
      - //./COM6://./COM6
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - dalybms-net

  # ── Node-RED (automatisation / logique métier) ───────────────────────────────
  nodered:
    image: nodered/node-red:4.0.2
    container_name: dalybms-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      TZ: Europe/Paris
    volumes:
      - nodered-data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dalybms-net

# =============================================================================
# Réseau interne
# =============================================================================
networks:
  dalybms-net:
    driver: bridge
    name: dalybms-net

# =============================================================================
# Volumes persistants
# =============================================================================
volumes:
  mosquitto-data:
    name: dalybms-mosquitto-data
  mosquitto-log:
    name: dalybms-mosquitto-log
  influxdb-data:
    name: dalybms-influxdb-data
  influxdb-config:
    name: dalybms-influxdb-config
  grafana-data:
    name: dalybms-grafana-data
  nodered-data:
    name: dalybms-nodered-data
  dalybms-alerts:
    name: dalybms-alerts
