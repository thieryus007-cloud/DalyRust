{% extends "base.html" %}
{% block title %}Visualisation ESS{% endblock %}
{% block page_title %}⚡ Visualisation Système{% endblock %}
{% block nav_viz %}active{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css">
<style>
  main { padding: 0 !important; max-width: 100% !important; height: calc(100vh - var(--topbar-h)); overflow: hidden; }
  .react-flow { background: #f0f4f8; }
  .react-flow__node { border: none !important; background: transparent !important; padding: 0 !important; border-radius: 0 !important; box-shadow: none !important; }
  .react-flow__handle { width: 8px; height: 8px; border-radius: 50%; border: 2px solid #fff; background: #94a3b8; opacity: 0; transition: opacity 0.2s; }
  .react-flow__node:hover .react-flow__handle { opacity: 1; }
  .react-flow__controls { box-shadow: 0 1px 3px rgba(15,23,42,.1); border-radius: 8px; border: 1px solid #d6dce5; overflow: hidden; }
  .react-flow__controls-button { background: #fff; border: none; border-bottom: 1px solid #d6dce5; color: #4b5563; }
  .react-flow__controls-button:hover { background: #f5f7fa; }
  .react-flow__controls-button:last-child { border-bottom: none; }

  .sn { width: 195px; background: #fff; border: 1px solid #d6dce5; border-radius: 10px; padding: 10px 13px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 3px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04); cursor: default; }
  .sn-icon { font-size: 1.55rem; flex-shrink: 0; line-height: 1; }
  .sn-body { flex: 1; min-width: 0; }
  .sn-label { font-size: 0.6rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; }
  .sn-value { font-size: 1.05rem; font-weight: 800; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .sn-sub { font-size: 0.63rem; color: #94a3b8; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sn-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
  .sn-dot.live { background: #16a34a; box-shadow: 0 0 6px rgba(22,163,74,.5); animation: nd-blink 2s infinite; }
  .sn-dot.warn { background: #ca8a04; }
  .sn-dot.alarm { background: #dc2626; box-shadow: 0 0 6px rgba(220,38,38,.5); animation: nd-blink 1s infinite; }

  .bms-nd { width: 235px; background: #fff; border: 1px solid #d6dce5; border-radius: 10px; padding: 10px 12px; box-shadow: 0 1px 3px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04); cursor: default; }
  .bms-nd.alarm { border-color: #fca5a5; background: #fff9f9; }
  .bms-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .bms-name { font-size: 0.78rem; font-weight: 700; color: #0f172a; flex: 1; }
  .bms-live-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
  .bms-live-dot.on { background: #16a34a; box-shadow: 0 0 6px rgba(22,163,74,.5); animation: nd-blink 2.5s infinite; }
  .bms-bar-bg { background: #e2e8f0; border-radius: 3px; height: 5px; margin-bottom: 8px; overflow: hidden; }
  .bms-bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s ease, background 0.6s; }
  .bms-kpis { display: flex; gap: 4px; }
  .bms-kpi { flex: 1; background: #f8fafc; border-radius: 6px; padding: 4px 5px; text-align: center; border: 1px solid #e2e8f0; }
  .bms-kpi-v { font-size: 0.82rem; font-weight: 700; color: #0f172a; line-height: 1.2; }
  .bms-kpi-l { font-size: 0.53rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }
  .bms-temp { font-size: 0.65rem; color: #4b5563; text-align: center; margin: 6px 0; padding: 2px 0; border-top: 1px solid #e2e8f0; }
  .bms-pwr { font-size: 0.68rem; color: #4b5563; text-align: center; margin-top: 7px; padding-top: 6px; border-top: 1px solid #f0f4f8; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }
  .bms-wait { font-size: 0.7rem; color: #94a3b8; font-style: italic; text-align: center; padding: 4px 0; }

  .dev-nd { width: 185px; background: #fff; border: 1px solid #d6dce5; border-radius: 10px; padding: 10px 12px; box-shadow: 0 1px 3px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04); cursor: default; }
  .dev-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .dev-lbl { font-size: 0.78rem; font-weight: 700; color: #0f172a; flex: 1; }
  .dev-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
  .dev-dot.on { background: #16a34a; box-shadow: 0 0 6px rgba(22,163,74,.5); animation: nd-blink 2.5s infinite; }
  .dev-pwr { font-size: 1.05rem; font-weight: 800; color: #0f172a; font-family: 'JetBrains Mono', monospace; }
  .dev-nrj { font-size: 0.63rem; color: #94a3b8; margin-top: 2px; }
  .dev-wait { font-size: 0.68rem; color: #94a3b8; font-style: italic; }

  .hub-nd { width: 165px; background: #fff; border: 1.5px solid #b8c2cf; border-radius: 10px; padding: 11px 13px; text-align: center; box-shadow: 0 1px 3px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04); cursor: default; }
  .hub-icon { font-size: 1.35rem; line-height: 1; margin-bottom: 4px; }
  .hub-lbl { font-size: 0.82rem; font-weight: 700; color: #0f172a; }
  .hub-sub { font-size: 0.62rem; color: #94a3b8; margin-top: 2px; }

  .ph-nd { width: 155px; background: #f8fafc; border: 1.5px dashed #b8c2cf; border-radius: 10px; padding: 10px 12px; text-align: center; cursor: default; }
  .ph-icon { font-size: 1.1rem; display: block; margin-bottom: 3px; line-height: 1; }
  .ph-lbl { font-size: 0.78rem; font-weight: 600; color: #4b5563; }
  .ph-badge { display: inline-block; font-size: 0.57rem; color: #94a3b8; font-style: italic; background: #e2e8f0; border-radius: 4px; padding: 1px 6px; margin-top: 4px; }

  @keyframes nd-blink { 0%,100%{opacity:1}50%{opacity:0.35} }

  .viz-panel { background: rgba(255,255,255,0.92); border: 1px solid #d6dce5; border-radius: 8px; padding: 6px 11px; font-size: 0.7rem; color: #4b5563; backdrop-filter: blur(6px); box-shadow: 0 1px 4px rgba(15,23,42,.08); }
  .viz-legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .viz-leg-item { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: #6b7280; }
  .viz-leg-line { width: 22px; height: 3px; border-radius: 2px; }

  .et112-card-wrapper { position: relative; }
  .bms-card-in-viz { width: 275px; cursor: default; overflow: visible; }
  .bms-card-in-viz .bms-hdr { background: linear-gradient(135deg, #fef9c3 0%, #fef08a 100%); }
  .bms-card-in-viz .bms-hdr.offline { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
  .bms-card-in-viz .kpi4 { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
  .bms-card-in-viz .kpi4-cell { padding: 0.65rem 0.75rem; border-right: 1px solid var(--border); border-top: 2px solid transparent; }
  .bms-card-in-viz .kpi4-cell.t-yellow { border-top-color: var(--yellow); }
  .bms-card-in-viz .kpi4-cell.t-blue { border-top-color: var(--accent); }
  .bms-card-in-viz .kpi4-cell.t-orange { border-top-color: var(--orange); }
  .bms-card-in-viz .kpi4-lbl { font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.18rem; }
  .bms-card-in-viz .kpi4-val { font-size: 1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .bms-card-in-viz .kpi4-val.chg { color: var(--green); }
  .bms-card-in-viz .kpi4-val.dch { color: var(--accent); }
  .bms-card-in-viz .istrip { display: grid; grid-template-columns: repeat(2, 1fr); border-bottom: 1px solid var(--border); }
  .bms-card-in-viz .icell { padding: 0.38rem 0.7rem; border-right: 1px solid var(--border); }
  .bms-card-in-viz .icell:last-child { border-right: none; }
  .bms-card-in-viz .i-lbl { font-size: 0.54rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 0.08rem; font-weight: 600; }
  .bms-card-in-viz .i-val { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text2); }
  .bms-card-in-viz .i-val.ok { color: var(--green); }
  .bms-card-in-viz .i-val.blue { color: var(--accent); }
  .bms-card-in-viz .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 0.75rem; color: var(--muted); text-align: center; }
  .bms-card-in-viz .empty-icon { font-size: 1.2rem; margin-bottom: 0.25rem; }
  .bms-card-in-viz .empty-title { font-size: 0.72rem; color: var(--text2); margin-bottom: 0.25rem; }
  .bms-card-in-viz .card-footer { padding: 0.4rem 0.75rem; display: flex; justify-content: flex-end; border-top: 1px solid var(--border); }
  .bms-card-in-viz .btn-link { font-size: 0.72rem; padding: 0.25rem 0.65rem; background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; text-decoration: none; cursor: pointer; transition: all 0.15s; }
  .bms-card-in-viz .btn-link:hover { background: var(--surface2); text-decoration: none; color: var(--text); }
</style>
{% endblock %}

{% block content %}
<div id="ess-flow-root" style="width:100%;height:calc(100vh - 56px)"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js" crossorigin></script>
<script>
'use strict';

const h = React.createElement;
const { useState, useEffect, useCallback } = React;
const { ReactFlow, Background, Controls, Panel, Handle, Position, useNodesState, useEdgesState } = window.ReactFlow;

const fmtKw  = w  => w  != null ? `${(w / 1000).toFixed(2)} kW` : '—';
const socColor = s => s > 60 ? '#16a34a' : s > 30 ? '#ca8a04' : '#dc2626';

function mkHandle(type, pos, id, style) {
  return h(Handle, { type, position: pos, id, style: { background: '#94a3b8', width: 8, height: 8, ...style } });
}

function SummaryNode({ data }) {
  return h('div', { className: 'sn' },
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Bottom, 'tb', { left: '65%' }),
    h('div', { className: 'sn-icon' }, data.icon),
    h('div', { className: 'sn-body' },
      h('div', { className: 'sn-label' }, data.label),
      h('div', { className: 'sn-value' }, data.value ?? '—'),
      h('div', { className: 'sn-sub'   }, data.sub   ?? '\u00a0')
    ),
    h('div', { className: `sn-dot ${data.dotClass ?? ''}` })
  );
}

function BmsNode({ data }) {
  const live  = data.live;
  const soc   = live?.Soc   ?? null;
  const cur   = live?.Dc?.Current ?? null;
  const pwr   = live?.Dc?.Power   ?? null;
  const volt  = live?.Dc?.Voltage ?? null;
  const tmax  = live?.System?.MaxCellTemperature ?? null;
  const alarm = live?.Alarms ? Object.values(live.Alarms).some(v => v > 0) : false;

  return h('div', { className: `bms-nd${alarm ? ' alarm' : ''}` },
    mkHandle('target', Position.Top, 'tt'),
    h('div', { className: 'bms-hdr' },
      h('span', null, '🔋'),
      h('span', { className: 'bms-name' }, data.label),
      h('div',  { className: `bms-live-dot${live ? ' on' : ''}` })
    ),
    h('div', { className: 'bms-bar-bg' },
      h('div', {
        className: 'bms-bar-fill',
        style: { width: `${soc ?? 0}%`, background: soc != null ? socColor(soc) : '#e2e8f0' }
      })
    ),
    h('div', { className: 'bms-kpis' },
      h('div', { className: 'bms-kpi' },
        h('div', { className: 'bms-kpi-v' }, soc != null ? `${soc.toFixed(0)}%` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'SOC')
      ),
      h('div', { className: 'bms-kpi' },
        h('div', { className: 'bms-kpi-v' }, volt != null ? `${volt.toFixed(1)}V` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'Tension')
      ),
      h('div', { className: 'bms-kpi' },
        h('div', {
          className: 'bms-kpi-v',
          style: { color: cur != null ? (cur < 0 ? '#dc2626' : cur > 0 ? '#2563eb' : '#0f172a') : undefined }
        }, cur != null ? `${cur > 0 ? '+' : ''}${cur.toFixed(1)}A` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'Courant')
      )
    ),
    tmax != null ? h('div', { className: 'bms-temp' }, `🌡 ${tmax.toFixed(1)}°C`) : null,
    h('div', { className: 'bms-pwr' },
      pwr != null ? `${pwr > 0 ? '+' : ''}${(pwr / 1000).toFixed(2)} kW` : live ? 'Données reçues…' : h('span', { className: 'bms-wait' }, 'En attente…')
    )
  );
}

function Et112CardNode({ data }) {
  const live = data.live;
  const connected = live?.connected ?? false;
  const pwr  = live?.power_w ?? null;
  const volt = live?.voltage_v ?? null;
  const cur  = live?.current_a ?? null;
  const imp  = live?.energy_import_wh != null ? live.energy_import_wh / 1000 : null;
  const expW = live?.energy_export_wh != null ? live.energy_export_wh / 1000 : null;
  const addr = data.address ?? 7;
  const icon = data.icon || '☀'; // Icône par défaut ou personnalisée

  return h('div', { className: 'et112-card-wrapper' },
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Left,   'sl', { top: '50%' }),
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '50%' }),
    h('div', { className: `bms-card-in-viz ${connected ? '' : 'offline-card'}`, style: { opacity: connected ? 1 : 0.7 } },
      h('div', { className: `bms-hdr ${connected ? '' : 'offline'}` },
        h('div', { className: 'bms-hdr-left' },
          connected ? h('div', { className: 'bms-live' }, h('div', { className: 'live-dot' }), 'LIVE') : h('span', { style: { fontSize: '0.62rem', color: 'var(--muted2)' } }, 'Hors ligne'),
          h('span', { className: 'bms-hdr-name' }, `${icon} `, data.label)
        ),
        h('div', { className: 'bms-hdr-right' }, h('span', { className: 'bms-badge' }, `0x0${addr.toString(16).toUpperCase()}`))
      ),
      connected && live ? h('div', { className: 'kpi4' },
        h('div', { className: 'kpi4-cell t-yellow' },
          h('div', { className: 'kpi4-lbl' }, 'Puissance'),
          h('div', { className: `kpi4-val ${(pwr ?? 0) >= 0 ? 'chg' : 'dch'}` }, pwr != null ? `${pwr.toFixed(0)} W` : '—')
        ),
        h('div', { className: 'kpi4-cell t-blue' },
          h('div', { className: 'kpi4-lbl' }, 'Tension'),
          h('div', { className: 'kpi4-val' }, volt != null ? `${volt.toFixed(1)} V` : '—')
        ),
        h('div', { className: 'kpi4-cell t-orange' },
          h('div', { className: 'kpi4-lbl' }, 'Courant'),
          h('div', { className: 'kpi4-val' }, cur != null ? `${cur.toFixed(2)} A` : '—')
        )
      ) : h('div', { className: 'empty-state' },
        h('div', { className: 'empty-icon' }, '⏳'),
        h('div', { className: 'empty-title' }, 'En attente de données')
      ),
      connected && live ? h('div', { className: 'istrip' },
        h('div', { className: 'icell' },
          h('span', { className: 'i-lbl' }, '⬇ Importée'),
          h('span', { className: 'i-val ok' }, imp != null ? `${imp.toFixed(2)} kWh` : '—')
        ),
        h('div', { className: 'icell' },
          h('span', { className: 'i-lbl' }, '⬆ Exportée'),
          h('span', { className: 'i-val blue' }, expW != null ? `${expW.toFixed(2)} kWh` : '—')
        )
      ) : null,
      h('div', { className: 'card-footer' },
        h('a', { href: `/dashboard/et112/${addr}`, className: 'btn-link' }, 'Détails →')
      )
    )
  );
}

function DeviceNode({ data }) {
  const live = data.live;
  const pwr  = live?.power_w;
  const nrj  = live?.energy_import_kwh;
  return h('div', { className: 'dev-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    h('div', { className: 'dev-hdr' },
      h('span', null, data.icon ?? '⚡'),
      h('span', { className: 'dev-lbl' }, data.label),
      h('div',  { className: `dev-dot${live?.connected ? ' on' : ''}` })
    ),
    live ? h('div', null,
      h('div', { className: 'dev-pwr' }, pwr != null ? `${(pwr / 1000).toFixed(2)} kW` : '—'),
      h('div', { className: 'dev-nrj' }, nrj != null ? `${nrj.toFixed(1)} kWh total` : '\u00a0')
    ) : h('div', { className: 'dev-wait' }, 'En attente…')
  );
}

function HubNode({ data }) {
  return h('div', { className: 'hub-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '68%' }),
    mkHandle('source', Position.Left,   'sl', { top: '68%' }),
    h('div', { className: 'hub-icon' }, data.icon),
    h('div', { className: 'hub-lbl'  }, data.label),
    data.sub && h('div', { className: 'hub-sub' }, data.sub)
  );
}

function PlaceholderNode({ data }) {
  return h('div', { className: 'ph-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '68%' }),
    mkHandle('source', Position.Left,   'sl', { top: '68%' }),
    data.icon && h('span', { className: 'ph-icon' }, data.icon),
    h('div', { className: 'ph-lbl'   }, data.label),
    h('div', { className: 'ph-badge' }, 'À venir')
  );
}

// ── Nouveaux composants Venus OS ───────────────────────────────────────────

function MPPTNode({ data }) {
  const live = data.live;
  const power = live?.power_w ?? null;
  const yieldToday = live?.yield_today_kwh ?? null;

  return h('div', { className: 'dev-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    h('div', { className: 'dev-hdr' },
      h('span', null, data.icon ?? '☀️'),
      h('span', { className: 'dev-lbl' }, data.label),
      h('div', { className: `dev-dot${live ? ' on' : ''}` })
    ),
    live ? h('div', null,
      h('div', { className: 'dev-pwr' }, power != null ? `${power.toFixed(0)} W` : '—'),
      h('div', { className: 'dev-nrj' }, yieldToday != null ? `${yieldToday.toFixed(2)} kWh` : '—')
    ) : h('div', { className: 'dev-wait' }, 'En attente…')
  );
}

function SmartShuntNode({ data }) {
  const live = data.live;
  const soc = live?.soc_percent ?? null;
  const voltage = live?.voltage_v ?? null;
  const current = live?.current_a ?? null;

  return h('div', { className: 'dev-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    h('div', { className: 'dev-hdr' },
      h('span', null, data.icon ?? '⚡'),
      h('span', { className: 'dev-lbl' }, data.label),
      h('div', { className: `dev-dot${live ? ' on' : ''}` })
    ),
    live ? h('div', null,
      h('div', { className: 'dev-pwr', style: { color: soc != null ? socColor(soc) : undefined } }, soc != null ? `${soc.toFixed(1)}%` : '—'),
      h('div', { className: 'dev-nrj' }, `${voltage?.toFixed(1)}V • ${current?.toFixed(1)}A`)
    ) : h('div', { className: 'dev-wait' }, 'En attente…')
  );
}

function TemperatureNode({ data }) {
  const live = data.live;
  const temp = live?.temp_c ?? null;
  const humidity = live?.humidity_percent ?? null;

  return h('div', { className: 'dev-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    h('div', { className: 'dev-hdr' },
      h('span', null, data.icon ?? '🌡️'),
      h('span', { className: 'dev-lbl' }, data.label),
      h('div', { className: `dev-dot${live ? ' on' : ''}` })
    ),
    live ? h('div', null,
      h('div', { className: 'dev-pwr' }, temp != null ? `${temp.toFixed(1)}°C` : '—'),
      h('div', { className: 'dev-nrj' }, humidity != null ? `${humidity.toFixed(0)}% HR` : '—')
    ) : h('div', { className: 'dev-wait' }, 'En attente…')
  );
}

const nodeTypes = { summary: SummaryNode, bms: BmsNode, et112card: Et112CardNode, device: DeviceNode, hub: HubNode, placeholder: PlaceholderNode, mppt: MPPTNode, smartshunt: SmartShuntNode, temperature: TemperatureNode };

const NODES0 = [
  { id: 'reseau',      type: 'summary',     position: { x: 30,   y: 20  }, data: { label: 'Réseau',          icon: '🔌', value: '—',   sub: 'Réseau EDF',            dotClass: '' } },
  { id: 'production',  type: 'summary',     position: { x: 265,  y: 20  }, data: { label: 'Production',      icon: '☀️',  value: '—',   sub: 'Micro-onduleurs',        dotClass: '' } },
  { id: 'batteries',   type: 'summary',     position: { x: 500,  y: 20  }, data: { label: 'Batteries',       icon: '🔋', value: '—',   sub: '360 Ah + 320 Ah',       dotClass: '' } },
  { id: 'meteo',       type: 'summary',     position: { x: 1020, y: 20  }, data: { label: 'Météo',           icon: '🌤️',  value: '—',   sub: 'Irradiance solaire',     dotClass: '' } },
  { id: 'ats',         type: 'hub',         position: { x: 65,   y: 170 }, data: { label: 'ATS',             icon: '🔀', sub: 'CHINT' } },
  { id: 'maison',      type: 'placeholder', position: { x: 1020, y: 170 }, data: { label: 'Maison',          icon: '🏠' } },
  { id: 'micro-ond',   type: 'et112card',   position: { x: -300, y: 272 }, data: { label: 'Micro-onduleurs', address: 7, live: null } },
  { id: 'mppt',        type: 'mppt',        position: { x: 560,  y: 375 }, data: { label: 'MPPT',            icon: '☀️', live: null } },
  { id: 'smartshunt',  type: 'smartshunt',  position: { x: 65,   y: 640 }, data: { label: 'SmartShunt',      icon: '📏', live: null } },
  { id: 'temp-ext',    type: 'temperature', position: { x: 1020, y: 640 }, data: { label: 'Température ext.', icon: '🌡️', live: null } },
  { id: 'bms1',        type: 'bms',         position: { x: -100, y: 790 }, data: { label: 'BMS-360Ah',       live: null } },
  { id: 'bms2',        type: 'bms',         position: { x: 165,  y: 790 }, data: { label: 'BMS-320Ah',       live: null } },
  { id: 'chauffe-eau',    type: 'device',      position: { x: 1020, y: 270 }, data: { label: 'Chauffe-eau',   icon: '🚿', live: null } },
  { id: 'climatisation',  type: 'device',      position: { x: 1020, y: 370 }, data: { label: 'Climatisation', icon: '❄️',  live: null } },
];

const COLOR = { ac: '#2563eb', dc: '#ea580c', bat: '#16a34a', gray: '#94a3b8' };

function mkEdge(id, src, tgt, color, opts = {}) {
  return { id, source: src, target: tgt, type: 'smoothstep', animated: false, style: { stroke: color, strokeWidth: 2.5 }, ...opts };
}

const EDGES0 = [
  mkEdge('e-res-ats',  'reseau',    'ats',       COLOR.ac,  { sourceHandle: 'sb', targetHandle: 'tt' }),
  mkEdge('e-ats-mai',  'ats',       'maison',    COLOR.ac,  { sourceHandle: 'sr', targetHandle: 'tl' }),
  mkEdge('e-mic-ats',  'micro-ond', 'ats',       COLOR.ac,  { sourceHandle: 'sr', targetHandle: 'tl' }),
  mkEdge('e-mic-shu',  'micro-ond', 'smartshunt', COLOR.ac, { sourceHandle: 'sb', targetHandle: 'tt' }),
  mkEdge('e-mppt-shu', 'mppt',      'smartshunt', COLOR.dc,  { sourceHandle: 'sl', targetHandle: 'tr' }),
  mkEdge('e-shu-b1',   'smartshunt','bms1',      COLOR.bat, { sourceHandle: 'sb', targetHandle: 'tt' }),
  mkEdge('e-shu-b2',   'smartshunt','bms2',      COLOR.bat, { sourceHandle: 'sb', targetHandle: 'tt' }),
  mkEdge('e-prod-met', 'production','meteo',     '#d946ef', { sourceHandle: 'sr', targetHandle: 'tl' }),
];

function ESSFlow() {
  const [nodes, setNodes, onNodesChange] = useNodesState(NODES0);
  const [edges, setEdges, onEdgesChange] = useEdgesState(EDGES0);
  const [lastUpdate, setLastUpdate] = useState('—');

  const applyData = useCallback(function(d) {
    const bms1 = d.bms1, bms2 = d.bms2;
    const et7  = d.et7,  et8  = d.et8, et9 = d.et9;
    const irr  = d.irr;
    const mppt = d.mppt;
    const shunt = d.shunt;
    const temp = d.temp;

    const validBms = [bms1, bms2].filter(Boolean);
    const avgSoc   = validBms.length
      ? (validBms.reduce((s, b) => s + (b.Soc ?? 0), 0) / validBms.length).toFixed(0)
      : null;
    const totalPwr = validBms.reduce((s, b) => s + (b.Dc?.Power ?? 0), 0);
    const batVal   = avgSoc != null ? `SOC ${avgSoc}%` : '—';
    const batSub   = totalPwr ? `${totalPwr > 0 ? '+' : ''}${(totalPwr / 1000).toFixed(2)} kW` : '360 Ah + 320 Ah';
    const batDot   = avgSoc == null ? '' : avgSoc > 50 ? 'live' : avgSoc > 20 ? 'warn' : 'alarm';

    // Production : ET112 PVInverter (0x07) + MPPT
    const microPwr = et7?.power_w ?? 0;
    const mpptPwr = mppt?.power_w ?? 0;
    const totalProdPwr = microPwr + mpptPwr;
    const prodVal  = fmtKw(totalProdPwr);
    const prodDot  = (et7?.connected || mppt) ? (totalProdPwr > 50 ? 'live' : '') : '';

    const irrVal  = irr?.irradiance_wm2 != null ? `${irr.irradiance_wm2.toFixed(0)} W/m²` : '—';
    const irrSub  = irr?.total_yield_kwh != null ? `☀ ${irr.total_yield_kwh.toFixed(1)} kWh` : 'Irradiance solaire';
    const irrDot  = irr ? 'live' : '';

    setEdges(prev => prev.map(e => {
      let animated = false;
      if (e.id === 'e-mic-ats' && et7?.connected && (microPwr ?? 0) > 50) animated = true;
      if (e.id === 'e-mic-shu' && et7?.connected && (microPwr ?? 0) > 50) animated = true;
      if (e.id === 'e-mppt-shu' && mppt && (mpptPwr ?? 0) > 50) animated = true;
      if (e.id === 'e-shu-b1'  && bms1 && Math.abs(bms1.Dc?.Current ?? 0) > 0.5) animated = true;
      if (e.id === 'e-shu-b2'  && bms2 && Math.abs(bms2.Dc?.Current ?? 0) > 0.5) animated = true;
      return animated !== e.animated ? { ...e, animated } : e;
    }));

    setNodes(prev => prev.map(n => {
      switch (n.id) {
        case 'batteries':
          return { ...n, data: { ...n.data, value: batVal, sub: batSub, dotClass: batDot } };
        case 'production':
          const prodSub = et7 ? `${((et7.energy_export_wh ?? 0) / 1000).toFixed(1)} kWh ET112` : mppt ? `${(mppt.yield_today_kwh ?? 0).toFixed(2)} kWh MPPT` : 'Micro-onduleurs';
          return { ...n, data: { ...n.data, value: prodVal, sub: prodSub, dotClass: prodDot } };
        case 'meteo':
          return { ...n, data: { ...n.data, value: irrVal, sub: irrSub, dotClass: irrDot } };
        case 'bms1': return { ...n, data: { ...n.data, live: bms1 ?? null } };
        case 'bms2': return { ...n, data: { ...n.data, live: bms2 ?? null } };
        case 'micro-ond':   return { ...n, data: { ...n.data, live: et7  ?? null } };
        case 'chauffe-eau': return { ...n, data: { ...n.data, live: et8  ?? null } };
        case 'climatisation': return { ...n, data: { ...n.data, live: et9 ?? null } };
        case 'mppt':        return { ...n, data: { ...n.data, live: mppt ?? null } };
        case 'smartshunt':  return { ...n, data: { ...n.data, live: shunt ?? null } };
        case 'temp-ext':    return { ...n, data: { ...n.data, live: temp ?? null } };
        default: return n;
      }
    }));

    setLastUpdate(new Date().toLocaleTimeString('fr-FR'));
  }, []);

  useEffect(function() {
    const safe = p => p.catch(() => null);
    async function fetchAll() {
      const [bms1, bms2, et7, et8, et9, irr, venusResp, tempResp] = await Promise.all([
        safe(fetch('/api/v1/bms/1/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/bms/2/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/et112/7/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/et112/8/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/et112/9/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/irradiance/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/venus/mppt').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/venus/temperatures').then(r => r.ok ? r.json() : null)),
      ]);

      // Extraire le premier MPPT et le premier capteur de température
      const mppt = venusResp?.mppts?.[0] ?? null;
      const shuntResp = await safe(fetch('/api/v1/venus/smartshunt').then(r => r.ok ? r.json() : null));
      const shunt = shuntResp?.shunt ?? null;
      const temps = tempResp?.temperatures ?? [];
      const temp = temps.length > 0 ? temps[0] : null;

      applyData({ bms1, bms2, et7, et8, et9, irr, mppt, shunt, temp });
    }
    fetchAll();
    const timer = setInterval(fetchAll, 2000);
    return function() { clearInterval(timer); };
  }, [applyData]);

  const legend = [
    { color: COLOR.ac,  label: 'Courant AC' },
    { color: COLOR.dc,  label: 'Bus DC' },
    { color: COLOR.bat, label: 'Batterie' },
  ];

  return h(ReactFlow, {
    nodes, edges, onNodesChange, onEdgesChange, nodeTypes, fitView: true,
    fitViewOptions: { padding: 0.06 }, minZoom: 0.2, maxZoom: 2.5,
    nodesDraggable: false, nodesConnectable: false, elementsSelectable: false, preventScrolling: false,
  },
    h(Background, { variant: 'dots', gap: 20, size: 1, color: '#c8d3de' }),
    h(Controls, { showInteractive: false }),
    h(Panel, { position: 'bottom-left' },
      h('div', { className: 'viz-panel viz-legend' },
        ...legend.map(l => h('div', { key: l.color, className: 'viz-leg-item' },
          h('div', { className: 'viz-leg-line', style: { background: l.color } }),
          l.label
        ))
      )
    ),
    h(Panel, { position: 'bottom-right' },
      h('div', { className: 'viz-panel' }, `Màj : ${lastUpdate}`)
    )
  );
}

ReactDOM.createRoot(document.getElementById('ess-flow-root')).render(h(ESSFlow));
</script>
{% endblock %}
