<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINT ATS - Modbus RTU (Parity Even)</title>
    <style>
        body { font-family: monospace; background: #1a2a3a; color: #eee; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e2a32; border-radius: 16px; padding: 20px; }
        button { background: #2c3e50; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin: 4px; font-size: 14px; }
        button:hover { background: #ffaa44; color: #1e2a32; }
        .status { padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .connected { background: #1f6d3a; }
        .disconnected { background: #7f2a1f; }
        .log-area { background: #0a1219; border-radius: 8px; padding: 10px; height: 280px; overflow-y: auto; font-size: 11px; font-family: monospace; }
        .reg-value { background: #0f1a1f; padding: 12px; border-radius: 8px; font-family: monospace; text-align: center; margin: 10px 0; font-size: 14px; }
        .flex { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; justify-content: center; }
        .param-badge { background: #2c3e50; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin: 2px; }
        hr { border-color: #3a5a6a; }
    </style>
</head>
<body>
<div class="container">
    <h2>⚡ CHINT ATS - Modbus RTU</h2>
    <div style="text-align: center; margin-bottom: 15px;">
        <span class="param-badge">📡 Adresse: 6</span>
        <span class="param-badge">⚡ 9600 bauds</span>
        <span class="param-badge">📊 8 data bits</span>
        <span class="param-badge">🛑 1 stop bit</span>
        <span class="param-badge" style="background:#1f6d3a;">✅ Parity: EVEN</span>
        <span class="param-badge">🔌 RTS: Disable</span>
    </div>
    
    <div class="status" id="statusDiv">🔌 Déconnecté</div>
    
    <div class="flex">
        <button id="connectBtn" style="background:#2c6e2c;">🔌 Connexion</button>
        <button id="disconnectBtn" style="background:#7f5a3a;">⛔ Déconnexion</button>
        <button id="readPowerBtn" style="background:#1f5a6d;">📡 Lire état sources (0x004F)</button>
        <button id="readSwitchBtn" style="background:#1f5a6d;">🔀 Lire commutateur (0x0050)</button>
        <button id="readTensionBtn" style="background:#1f5a6d;">📊 Lire tensions (0x0006)</button>
        <button id="remoteOnBtn" style="background:#1f6d3a;">📡 Activer télécommande</button>
        <button id="remoteOffBtn" style="background:#7f5a3a;">🔒 Désactiver télécommande</button>
        <button id="forceDoubleBtn" style="background:#c97e1a;">⏹️ Forcer double</button>
    </div>
    
    <div class="reg-value" id="resultDisplay">
        -- Cliquez sur Connexion puis sur un bouton --
    </div>
    
    <div class="log-area" id="logArea">
        <div>✨ Paramètres: 9600 bauds, 8 data bits, 1 stop bit, Parity EVEN</div>
        <div>✨ Adresse Modbus: 6</div>
        <div>✨ Cliquez sur Connexion, sélectionnez COM5</div>
    </div>
    <button id="clearLogBtn" style="margin-top: 10px;">🗑️ Effacer journal</button>
</div>

<script>
    let port = null;
    let reader = null;
    let writer = null;
    let isConnected = false;
    
    const ADDRESS = 6;
    const BAUD = 9600;
    
    // Délais (peuvent être ajustés)
    const PRE_DELAY = 20;        // 20ms avant envoi (plus sûr)
    const RESPONSE_TIMEOUT = 800; // 800ms timeout
    
    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logArea");
        const entry = document.createElement("div");
        const time = new Date().toLocaleTimeString();
        let prefix = "ℹ️";
        if (type === "error") prefix = "❌";
        if (type === "send") prefix = "📤";
        if (type === "recv") prefix = "📥";
        if (type === "success") prefix = "✅";
        if (type === "warning") prefix = "⚠️";
        entry.innerHTML = `[${time}] ${prefix} ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
    
    function computeCRC(data) {
        let crc = 0xFFFF;
        for (let i = 0; i < data.length; i++) {
            crc ^= data[i];
            for (let bit = 0; bit < 8; bit++) {
                if (crc & 0x0001) {
                    crc = (crc >> 1) ^ 0xA001;
                } else {
                    crc = crc >> 1;
                }
            }
        }
        return crc;
    }
    
    function addCRC(bytes) {
        const crc = computeCRC(bytes);
        return new Uint8Array([...bytes, crc & 0xFF, (crc >> 8) & 0xFF]);
    }
    
    async function sendWithDelay(bytes) {
        if (!writer || !isConnected) return false;
        await new Promise(r => setTimeout(r, PRE_DELAY));
        
        const frame = addCRC(bytes);
        const hexStr = Array.from(frame).map(b => b.toString(16).padStart(2,'0')).join(' ');
        addLog(`Envoi: ${hexStr}`, "send");
        
        try {
            await writer.write(frame);
            return true;
        } catch(e) {
            addLog(`Erreur envoi: ${e.message}`, "error");
            return false;
        }
    }
    
    async function readWithTimeout() {
        if (!reader) return null;
        
        const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error("Timeout")), RESPONSE_TIMEOUT)
        );
        
        try {
            const readPromise = reader.read();
            const { value, done } = await Promise.race([readPromise, timeoutPromise]);
            if (done || !value) return null;
            
            const hexResp = Array.from(value).map(b => b.toString(16).padStart(2,'0')).join(' ');
            addLog(`Réponse: ${hexResp}`, "recv");
            return value;
        } catch(e) {
            if (e.message === "Timeout") {
                addLog(`Timeout (${RESPONSE_TIMEOUT}ms) - Pas de réponse`, "error");
            }
            return null;
        }
    }
    
    async function sendAndReceive(bytes) {
        if (!isConnected) {
            addLog("Non connecté", "error");
            return null;
        }
        if (!await sendWithDelay(bytes)) return null;
        return await readWithTimeout();
    }
    
    // ========== Commandes ==========
    
    async function readPowerStatus() {
        addLog("Lecture état sources (registre 0x004F)...");
        const resp = await sendAndReceive(new Uint8Array([ADDRESS, 0x03, 0x00, 0x4F, 0x00, 0x01]));
        if (resp && resp.length >= 5) {
            const val = (resp[3] << 8) | resp[4];
            document.getElementById("resultDisplay").innerHTML = `📊 État sources (0x004F) = 0x${val.toString(16).padStart(4,'0')} (${val} déc.)<br>🔍 Binaire: ${val.toString(2).padStart(16,'0')}`;
            addLog(`Valeur: 0x${val.toString(16)} (${val})`, "success");
        } else {
            document.getElementById("resultDisplay").innerHTML = "❌ Échec lecture état sources - Vérifiez la connexion";
        }
    }
    
    async function readSwitchStatus() {
        addLog("Lecture état commutateur (registre 0x0050)...");
        const resp = await sendAndReceive(new Uint8Array([ADDRESS, 0x03, 0x00, 0x50, 0x00, 0x01]));
        if (resp && resp.length >= 5) {
            const val = (resp[3] << 8) | resp[4];
            document.getElementById("resultDisplay").innerHTML = `🔀 État commutateur (0x0050) = 0x${val.toString(16).padStart(4,'0')} (${val} déc.)`;
            addLog(`Valeur: 0x${val.toString(16)}`, "success");
        } else {
            document.getElementById("resultDisplay").innerHTML = "❌ Échec lecture commutateur";
        }
    }
    
    async function readTension() {
        addLog("Lecture tension phase A Source I (registre 0x0006)...");
        const resp = await sendAndReceive(new Uint8Array([ADDRESS, 0x03, 0x00, 0x06, 0x00, 0x01]));
        if (resp && resp.length >= 5) {
            const val = (resp[3] << 8) | resp[4];
            document.getElementById("resultDisplay").innerHTML = `📊 Tension phase A Source I = ${val} V`;
            addLog(`Tension: ${val}V`, "success");
        } else {
            document.getElementById("resultDisplay").innerHTML = "❌ Échec lecture tension";
        }
    }
    
    async function remoteControl(enable) {
        const cmd = enable ? 0x0004 : 0x0000;
        addLog(enable ? "Activation télécommande..." : "Désactivation télécommande...");
        const resp = await sendAndReceive(new Uint8Array([ADDRESS, 0x06, 0x28, 0x00, (cmd>>8)&0xFF, cmd&0xFF]));
        if (resp) {
            addLog(enable ? "Télécommande activée" : "Télécommande désactivée", "success");
            document.getElementById("resultDisplay").innerHTML = enable ? "✅ Mode télécommande activé" : "🔒 Mode télécommande désactivé";
        } else {
            document.getElementById("resultDisplay").innerHTML = "❌ Échec commande télécommande";
        }
    }
    
    async function forceDouble() {
        addLog("Forçage position double déclenché...");
        const resp = await sendAndReceive(new Uint8Array([ADDRESS, 0x06, 0x27, 0x00, 0x00, 0xFF]));
        if (resp) {
            addLog("Forçage double envoyé", "success");
            document.getElementById("resultDisplay").innerHTML = "✅ Forçage position double envoyé";
        } else {
            document.getElementById("resultDisplay").innerHTML = "❌ Échec forçage double";
        }
    }
    
    // ========== Connexion ==========
    
    async function connect() {
        if (port) {
            addLog("Déjà connecté", "warning");
            return;
        }
        
        try {
            addLog("Sélectionnez le port RS485 (COM5)...");
            port = await navigator.serial.requestPort();
            
            // Paramètres identiques à QModbusExplorer
            await port.open({
                baudRate: BAUD,
                dataBits: 8,
                stopBits: 1,
                parity: "even"   // ← PARITY EVEN (comme QModbusExplorer)
            });
            
            const textEncoder = new TextEncoderStream();
            const textDecoder = new TextDecoderStream();
            
            textEncoder.readable.pipeTo(port.writable);
            port.readable.pipeTo(textDecoder.writable);
            
            writer = textEncoder.writable.getWriter();
            reader = textDecoder.readable.getReader();
            
            isConnected = true;
            document.getElementById("statusDiv").className = "status connected";
            document.getElementById("statusDiv").innerHTML = "✅ Connecté | COM5 | 9600 | 8N1 | Even | Adresse 6";
            addLog("Connecté avec succès ! (Parity Even)", "success");
            
            await new Promise(r => setTimeout(r, 100));
            
            // Test automatique
            addLog("Test de communication...");
            await readPowerStatus();
            
        } catch (err) {
            addLog("Erreur: " + err.message, "error");
            port = null;
            isConnected = false;
        }
    }
    
    async function disconnect() {
        if (reader) await reader.cancel();
        if (writer) await writer.close();
        if (port) await port.close();
        
        reader = null;
        writer = null;
        port = null;
        isConnected = false;
        
        document.getElementById("statusDiv").className = "status disconnected";
        document.getElementById("statusDiv").innerHTML = "🔌 Déconnecté";
        addLog("Déconnecté");
    }
    
    // Events
    document.getElementById("connectBtn").onclick = connect;
    document.getElementById("disconnectBtn").onclick = disconnect;
    document.getElementById("readPowerBtn").onclick = readPowerStatus;
    document.getElementById("readSwitchBtn").onclick = readSwitchStatus;
    document.getElementById("readTensionBtn").onclick = readTension;
    document.getElementById("remoteOnBtn").onclick = () => remoteControl(true);
    document.getElementById("remoteOffBtn").onclick = () => remoteControl(false);
    document.getElementById("forceDoubleBtn").onclick = forceDouble;
    document.getElementById("clearLogBtn").onclick = () => { document.getElementById("logArea").innerHTML = "<div>Journal effacé</div>"; };
    
    if (!navigator.serial) {
        addLog("❌ Web Serial API non supportée. Utilise Chrome, Edge ou Brave.", "error");
        document.getElementById("connectBtn").disabled = true;
    }
</script>
</body>
</html>
