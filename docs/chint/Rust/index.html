<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CHINT ATS - Rust</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .status { padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .connected { background: #15803d; }
        .error { background: #b91c1c; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border-radius: 16px; padding: 20px; }
        .card h3 { color: #fbbf24; margin-bottom: 15px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        button { background: #3b82f6; border: none; color: white; padding: 10px 18px; border-radius: 8px; cursor: pointer; margin: 4px; }
        button:hover { background: #2563eb; }
        .log { background: #0f172a; border-radius: 12px; padding: 12px; height: 200px; overflow-y: auto; font-size: 11px; margin-top: 20px; }
        .flex { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ CHINT ATS - Rust Edition</h1>
    <div id="status" class="status error">🔌 Connexion...</div>
    
    <div class="grid">
        <div class="card"><h3>🔵 Source I</h3>
            <div class="data-row"><span>Phase A</span><span id="v1a">---</span></div>
            <div class="data-row"><span>Phase B</span><span id="v1b">---</span></div>
            <div class="data-row"><span>Phase C</span><span id="v1c">---</span></div>
        </div>
        <div class="card"><h3>🟠 Source II</h3>
            <div class="data-row"><span>Phase A</span><span id="v2a">---</span></div>
            <div class="data-row"><span>Phase B</span><span id="v2b">---</span></div>
            <div class="data-row"><span>Phase C</span><span id="v2c">---</span></div>
        </div>
        <div class="card"><h3>🔀 Commutateur</h3>
            <div class="data-row"><span>Source I</span><span id="sw1">---</span></div>
            <div class="data-row"><span>Source II</span><span id="sw2">---</span></div>
            <div class="data-row"><span>Mode</span><span id="swMode">---</span></div>
        </div>
        <div class="card"><h3>📊 Stats</h3>
            <div class="data-row"><span>Commutations I</span><span id="cnt1">---</span></div>
            <div class="data-row"><span>Commutations II</span><span id="cnt2">---</span></div>
            <div class="data-row"><span>Version</span><span id="swVer">---</span></div>
        </div>
    </div>
    
    <div class="card">
        <h3>🎮 Commandes</h3>
        <div class="flex">
            <button onclick="sendCmd('remote_on')">📡 Activer télécommande</button>
            <button onclick="sendCmd('remote_off')">🔒 Désactiver</button>
            <button onclick="sendCmd('force_double')">⏹️ Forcer double</button>
            <button onclick="sendCmd('force_source1')">🔵 Source I</button>
            <button onclick="sendCmd('force_source2')">🟠 Source II</button>
        </div>
    </div>
    
    <div class="log" id="log"><div>✨ Prêt - Actualisation auto</div></div>
    <button onclick="refresh()">🔄 Actualiser</button>
</div>

<script>
    async function refresh() {
        try {
            const r = await fetch('/api/read_all');
            const d = await r.json();
            if (d.success) {
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').innerHTML = '✅ Connecté';
                for (const [k,v] of Object.entries(d.values)) {
                    const el = document.getElementById(k);
                    if (el) el.innerHTML = v;
                }
            } else {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').innerHTML = '⚠️ Erreur';
            }
        } catch(e) { console.log(e); }
    }
    
    async function sendCmd(cmd) {
        await fetch('/api/' + cmd);
        setTimeout(refresh, 500);
    }
    
    setInterval(refresh, 5000);
    refresh();
</script>
</body>
</html>
