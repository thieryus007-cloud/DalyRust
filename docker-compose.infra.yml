# docker-compose.infra.yml
# Infrastructure de base pour DalyBMS (Mosquitto + InfluxDB + Grafana + Node-RED)
# Phase 1 — ces services tournent en Docker, le serveur principal (Rust ou Python) est natif

services:

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: dalybms-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"       # MQTT standard
      - "9001:9001"       # MQTT over WebSocket (pour Node-RED si besoin)
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influxdb:
    image: influxdb:2.7.10
    container_name: dalybms-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-supersecret}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-santuario}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-daly_bms}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: dalybms-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"   # 3000 réservé pour dev, on mappe sur 3001
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-santuario}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-daly_bms}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  nodered:
    image: nodered/node-red:4.0.2
    container_name: dalybms-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=Europe/Paris
      - HOSTNAME=pi5
      # InfluxDB — persistance production solaire (écriture + restore au démarrage +5s)
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG:-santuario}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-daly_bms}
      # VRM API — restauration authoritative au démarrage +10s (today.totals.kwh)
      # Créer le token sur vrm.victronenergy.com → Profile → Personal Access Tokens
      - VRM_TOKEN=${VRM_TOKEN:-}
      - VRM_INSTALLATION_ID=${VRM_INSTALLATION_ID:-865936}
    volumes:
      - nodered-data:/data
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  influxdb-config:
  grafana-data:
  nodered-data:
