# =============================================================================
# DalyBMS — Rust Edition — Configuration principale
# =============================================================================
# Ce fichier est utilisé pour :
#   - Développement Windows (cargo run, BMS réel ou simulateur)
#   - Déploiement natif Linux / Raspberry Pi 5
#
# Pour la stack Docker complète (docker compose up), utiliser Config.docker.toml.
#
# Ordre de chargement :
#   1. Variable d'environnement DALY_CONFIG
#   2. ./Config.toml  (répertoire courant — Windows / dev)
#   3. /etc/daly-bms/config.toml  (Linux production)
# Date de référence : mars 2026

[serial]
# Port série RS485 (USB → /dev/ttyUSB* ou /dev/ttyACM*)
# Sur Linux : /dev/ttyUSB0 ou /dev/ttyUSB1
# Sur Windows : laisser vide pour auto-détection, ou spécifier COM5, COM6...
port = "/dev/ttyUSB0"

# Vitesse de communication (Daly standard = 9600)
baud = 9600

# Intervalle de polling global (en millisecondes)
# 1000 ms = 1 requête par seconde → bon équilibre réactivité / charge CPU
poll_interval_ms = 1000

# Nombre maximum de cellules attendues (utilisé pour parsing multi-trames)
default_cell_count = 16

# Nombre de sondes NTC attendues
default_temp_sensors = 4

# Taille du ring buffer en mémoire (nombre de snapshots conservés)
# 3600 = 1 heure à 1 Hz → bon pour historique court terme + export CSV
ring_buffer_size = 3600

# Activer la découverte automatique au démarrage (sonde 0x01 → 0xFF)
# Recommandé : activer une fois pour détecter, puis passer en manuel
auto_discover = false

# Plage de découverte auto (si activée)
auto_discover_start = 1
auto_discover_end   = 16

# Liste explicite des BMS (recommandé en production)
# Format : "0x01,0x02,0x03" ou tableau TOML ["0x01", "0x02"]
addresses = ["0x01", "0x02"]


[api]
# Interface et port d'écoute (0.0.0.0 = accessible depuis le réseau local)
bind = "0.0.0.0:8080"

# Clé API pour protéger les endpoints d'écriture (MOS, SOC, config, reset)
# Vide ou absent = pas d'authentification (développement uniquement !)
# En production : générez une clé forte (ex: openssl rand -hex 32)
api_key = ""

# Activer CORS (utile si dashboard sur un autre domaine/port en dev)
cors_allow_all = true
# cors_origins = ["http://localhost:3000", "https://dalybms.local"]


[logging]
# Niveau de logs (trace, debug, info, warn, error)
level = "trace"

# Format des logs (pretty = coloré et lisible, json = pour parsing)
format = "pretty"


[mqtt]
enabled = true

# Windows avec Docker Desktop local → "localhost"
# Windows avec NanoPi comme broker → "192.168.1.120"
# Raspberry Pi 5 production        → "localhost" (Mosquitto local) ou IP NanoPi
host = "192.168.1.120"
port = 1883

# Préfixe des topics (ex: santuario/bms/1/venus)
topic_prefix = "santuario/bms"

# Intervalle de publication (secondes)
publish_interval_sec = 1

# Authentification MQTT (optionnelle)
# username = ""
# password = ""

# Format de publication
# "json" = un message JSON complet par BMS
# "simple" = un topic par valeur (ex: santuario/bms/1/soc → 75.2)
format = "json"


# =============================================================================
# Venus OS D-Bus bridge (dbus-mqtt-venus)
# =============================================================================
# Ce service publie chaque BMS comme com.victronenergy.battery.{prefix}_{index}
# sur le bus D-Bus de Venus OS, alimenté par les payloads MQTT /venus.
#
# Prérequis :
#   - daly-bms-server actif avec mqtt.enabled = true
#   - Broker Mosquitto accessible (mqtt.host + mqtt.port ci-dessus)
#   - dbus-mqtt-venus déployé sur le NanoPi/GX (voir nanoPi/install-venus.sh)

[venus]
enabled = true

# Bus D-Bus :
#   "system"  → /var/run/dbus/system_bus_socket (Venus OS production)
#   "session" → $DBUS_SESSION_BUS_ADDRESS       (test développement sans sudo)
dbus_bus = "system"

# Préfixe du suffixe de service D-Bus.
# Service résultant : com.victronenergy.battery.{prefix}_{mqtt_index}
# Ex: "mqtt" + mqtt_index=1 → com.victronenergy.battery.mqtt_1
service_prefix = "mqtt"

# Watchdog (secondes) : si aucune donnée MQTT pendant ce délai,
# /Connected passe à 0 → Venus OS marque la batterie comme hors ligne
watchdog_sec = 30

# Intervalle de republication forcée (secondes) — garantit le keepalive Venus OS
# Doit être < watchdog_sec et < 60s (keepalive MQTT bridge Venus)
republish_sec = 25


# =============================================================================
# Capteurs de température extérieure (com.victronenergy.temperature.{n})
# =============================================================================
# Topic MQTT source : santuario/heat/{n}/venus
# Payload attendu (publié par Node-RED depuis Open-Meteo) :
#   { "Temperature": 15.3, "TemperatureType": 4, "Humidity": 65.0, "Pressure": 101.3 }
#
# TemperatureType : 0=battery 1=fridge 2=generic 3=Room 4=Outdoor 5=WaterHeater 6=Freezer
# La valeur config a PRIORITÉ sur celle du payload.

[heat]
# Préfixe des topics température (séparé du BMS prefix)
topic_prefix = "santuario/heat"

[[sensors]]
mqtt_index       = 1       # Topic : santuario/heat/1/venus
name             = "Temperature Exterieure"
temperature_type = 4       # 4 = Outdoor
device_instance  = 20      # DeviceInstance Venus OS / VRM

# =============================================================================
# Pompes à chaleur / chauffe-eau (com.victronenergy.heatpump.{n})
# =============================================================================
# Topic MQTT source : santuario/heatpump/{n}/venus
# Payload attendu (publié par Node-RED) :
#   { "State": 0, "Temperature": 55.0, "TargetTemperature": 60.0,
#     "Ac": { "Power": 1200.0, "Energy": { "Forward": 125.5 } }, "Position": 0 }
#
# /State             — enum état (TBD Victron)
# /Temperature       — température eau courante °C
# /TargetTemperature — température eau cible °C
# /Ac/Power          — puissance consommée W
# /Ac/Energy/Forward — énergie totale kWh
# /Position          — 0=AC Output, 1=AC Input

[heatpump]
# Préfixe des topics heatpump
topic_prefix = "santuario/heatpump"

[[heatpumps]]
mqtt_index      = 1       # Topic : santuario/heatpump/1/venus
name            = "Chauffe-eau"
device_instance = 30      # DeviceInstance Venus OS / VRM

# Pompe à chaleur LG (future intégration — même service D-Bus)
# [[heatpumps]]
# mqtt_index      = 2     # Topic : santuario/heatpump/2/venus
# name            = "PAC LG Climatisation"
# device_instance = 31

# =============================================================================
# Capteur météo / irradiance RS485 (com.victronenergy.meteo)
# =============================================================================
# Topic MQTT source FIXE : santuario/meteo/venus (sans index — un seul capteur)
# Payload attendu (publié par Node-RED depuis capteur RS485 Pi5) :
#   { "Irradiance": 750.0, "TodaysYield": 12.5 }
#
# /Irradiance    — irradiance courante W/m²
# /TodaysYield   — production du jour kWh (depuis le lever du soleil)

[meteo]
topic           = "santuario/meteo/venus"
product_name    = "Capteur Irradiance"
device_instance = 40      # DeviceInstance Venus OS / VRM


# =============================================================================
# Compteur énergie ET112 Carlo Gavazzi (RS485 Modbus RTU)
# =============================================================================
# Matériel : ET112 sur /dev/ttyUSB1 (FTDI FT232 USB-RS485, Bus 004 Device 003)
# Adresses : 0x03 = micro-inverseurs Pi5 (0x01 et 0x02 connectés directement sur Victron)
#
# Chemins D-Bus pvinverter exposés (via dbus-mqtt-venus sur NanoPi) :
#   /Ac/Power, /Ac/Energy/Forward
#   /Ac/L1/{Voltage, Current, Power, Energy/Forward}
#   /StatusCode=7, /ErrorCode=0, /Position=1, /IsGenericEnergyMeter=1

[et112]
# Port série USB-RS485 (partagé ou dédié)
port = "/dev/ttyUSB1"

# Vitesse de communication (ET112 standard = 9600 baud)
baud = 9600

# Intervalle de polling en millisecondes (5000 = toutes les 5 secondes)
poll_interval_ms = 5000

# Taille du ring buffer (720 = 1 heure à 1 mesure/5s)
ring_buffer_size = 720

[[et112.devices]]
address     = "0x03"           # Adresse Modbus RTU de l'ET112
name        = "Micro-inverseurs"
mqtt_index  = 3                # → topic santuario/pvinverter/3/venus

# Les ET112 0x01 et 0x02 sont connectés directement sur le Victron (à migrer)
# [[et112.devices]]
# address     = "0x01"
# name        = "ET112-PV-1"
# mqtt_index  = 1
# [[et112.devices]]
# address     = "0x02"
# name        = "ET112-PV-2"
# mqtt_index  = 2


[influxdb]
# true  = activer l'écriture InfluxDB (Docker infra doit être démarré)
# false = désactiver (pas de Docker, ou test sans InfluxDB)
enabled = true

# Windows Docker Desktop ou Linux local → http://localhost:8086
# Docker Compose interne             → http://dalybms-influxdb:8086 (Config.docker.toml)
url = "http://localhost:8086"

# Token généré par InfluxDB (identique à INFLUX_TOKEN dans .env)
# Générer : docker exec dalybms-influxdb influx auth create --org santuario --all-access
# Ou via UI : http://localhost:8086 → Load Data → API Tokens
token = "TGEh4wl5TE7SEeJd7GDdyjDebo48xEJaD63MKbgdNhLz54-AWLxWtEBxoAqIEPd9KOucM_kpJGtvFu3oZ98KeQ=="

org = "santuario"

# Bucket principal (rétention courte ~30 jours)
bucket = "daly_bms"

# Bucket downsamplé 1 min (rétention longue ~1 an)
bucket_downsampled = "daly_bms_1m"

# Taille max d'un batch d'écriture (points)
batch_size = 50

# Délai max avant flush forcé (secondes)
batch_flush_interval_sec = 5.0


[alerts]
# Chemin de la base SQLite pour journal des alertes
# Laisser vide pour désactiver les alertes (pas de base SQLite requise)
db_path = ""

# Intervalle d'évaluation des règles (secondes)
check_interval_sec = 1.0

# Telegram (optionnel)
telegram_token = ""
telegram_chat_id = ""

# Email SMTP (optionnel)
smtp_host = ""
smtp_port = 587
smtp_username = ""
smtp_password = ""
smtp_from = "dalybms@santuario.local"
smtp_to = "admin@santuario.local"

# Seuils d'alertes logicielles (indépendants des seuils hardware BMS)
[alerts.thresholds]
cell_ovp_v          = 3.60
cell_uvp_v          = 2.90
cell_delta_mv       = 100
soc_low_percent     = 20.0
soc_critical_percent= 10.0
temp_high_c         = 45.0
current_high_a      = 80.0


[read_only]
# Mode lecture seule globale (désactive TOUTES les commandes d'écriture)
# Très recommandé en production si pas de besoin de contrôle distant
enabled = false


# =============================================================================
# Configurations individuelles par BMS (optionnel)
# =============================================================================
# Une section [[bms]] par appareil.  Si absente, les valeurs par défaut sont
# utilisées (capacité 100 Ah, pas de nom personnalisé).
# L'adresse est l'adresse RS485 décimale ou hexadécimale.

[[bms]]
address         = "0x01"
name            = "BMS-360Ah"
capacity_ah     = 360.0
max_charge_a    = 200.0
max_discharge_a = 120.0
mqtt_index      = 1    # index topic MQTT (santuario/bms/1/venus), même que dbus-mqtt-battery-41
device_instance = 151  # DeviceInstance Venus OS / VRM (141/142 = dbus-mqtt-battery, 151/152 = dbus-mqtt-venus)

[[bms]]
address         = "0x02"
name            = "BMS-320Ah"
capacity_ah     = 320.0
max_charge_a    = 200.0
max_discharge_a = 120.0
mqtt_index      = 2    # index topic MQTT (santuario/bms/2/venus), même que dbus-mqtt-battery-42
device_instance = 152  # DeviceInstance Venus OS / VRM


# =============================================================================
# Notes supplémentaires
# =============================================================================
# - Les chemins absolus sont fortement recommandés en systemd/Docker
# - Pour la Phase 2 (tout en Docker) : montez /etc/daly-bms/config.toml comme volume
# - Les variables d'environnement ont priorité sur le fichier TOML
#   (ex: DALY_API_KEY=xxx cargo run)
# - Logs : journalctl -u daly-bms -f  ou  RUST_LOG=debug daly-bms-server
