; CONFIG FILE
; GitHub reporitory: https://github.com/mr-manuel/venus-os_dbus-mqtt-battery
; remove semicolon ; to enable desired setting

[DEFAULT]
; Set logging level
; ERROR = shows errors only
; WARNING = shows ERROR and warnings
; INFO = shows WARNING and running functions
; DEBUG = shows INFO and data/values
; default: WARNING
logging = WARNING

; Device name
; default: MQTT Battery
device_name = MQTT Battery 360Ah

; Device VRM instance
; default: 100
device_instance = 141

; Timeout déconnexion si aucun message reçu (secondes)
; 0 = désactivé. Mettre à 2 × MQTT_INTERVAL du RPi CM5 (défaut 5s → 15s)
timeout = 15

; ── Broker MQTT ──────────────────────────────────────────────────────────────
; IP du RPi CM5 (broker Mosquitto Docker — port 1883)
; Adapter l'adresse IP selon votre réseau local
broker_address = 192.168.1.120
broker_port = 1883

; Authentification (laisser vide si allow_anonymous true dans mosquitto.conf)
username =
password =


[TIME_TO_GO]
; Calculates the Time-To-Go shown in the GUI
; 0 = Disabled
; 1 = Enabled
enabled = 1
; Specify the SoC which is used for calculation
; default: 10
soc = 10
; Specify in seconds how often the Time-To-Go should be recalculated
; Minimum are 5 seconds to prevent CPU overload
; default: 300
recalculate_every = 60


[MQTT]
; IP addess or FQDN from MQTT server
broker_address = 192.168.1.120
broker_port = 1883
topic = santuario/bms/1/venus

; Enables TLS
; 0 = Disabled
; 1 = Enabled
;tls_enabled = 1

; Absolute path to the Certificate Authority certificate file that is to be treated as trusted by this client
;tls_path_to_ca = /data/keys/mosquitto.crt

; Disables verification of the server hostname in the server certificate
; 0 = Disabled
; 1 = Enabled
;tls_insecure = 1

; Username used for connection
;username = myuser

; Password used for connection
;password = mypassword

; Topic where the meters data as JSON string is published
; minimum required JSON payload: { "Dc": { "Power": 321.6, "Voltage": 52.6  }, "Soc": 63 }
; topic = enphase/battery
