; ─────────────────────────────────────────────────────────────────────────────
; dbus-mqtt-battery — Instance 41 — Pack 320Ah (BMS 1, adresse RS485 0x01)
; Copier vers : /data/etc/dbus-mqtt-battery-41/config.ini
; GitHub : https://github.com/mr-manuel/venus-os_dbus-mqtt-battery
; ─────────────────────────────────────────────────────────────────────────────

[DEFAULT]

; Niveau de log
; ERROR | WARNING | INFO | DEBUG
logging = WARNING

; Nom affiché dans Venus OS et VRM
device_name = MQTT Battery 360Ah

; Instance VRM — doit être unique sur le GX
; Visible dans : Venus OS → Settings → System setup
device_instance = 141

; Timeout déconnexion si aucun message reçu (secondes)
; 0 = désactivé. Mettre à 2 × MQTT_INTERVAL du RPi CM5 (défaut 5s → 15s)
timeout = 15

; ── Broker MQTT ──────────────────────────────────────────────────────────────
; IP du RPi CM5 (broker Mosquitto Docker — port 1883)
; Adapter l'adresse IP selon votre réseau local
broker_address = 192.168.1.120
broker_port = 1883
topic = santuario/bms/1/venus

; Authentification (laisser vide si allow_anonymous true dans mosquitto.conf)
username =
password =

; ── Time-To-Go ───────────────────────────────────────────────────────────────
[TIME_TO_GO]
; 1 = calculer et afficher le temps restant estimé dans VRM
enabled = 1
; SOC minimal utilisé pour le calcul (%)
soc = 10
; Recalcul toutes les N secondes (minimum 5)
recalculate_every = 60
