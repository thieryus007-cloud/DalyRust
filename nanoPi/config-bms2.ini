; ─────────────────────────────────────────────────────────────────────────────
; dbus-mqtt-battery — Instance 42 — Pack 360Ah (BMS 2, adresse RS485 0x02)
; Copier vers : /data/etc/dbus-mqtt-battery-42/config.ini
; GitHub : https://github.com/mr-manuel/venus-os_dbus-mqtt-battery
; ─────────────────────────────────────────────────────────────────────────────

[DEFAULT]

; Niveau de log
logging = WARNING

; Nom affiché dans Venus OS et VRM
device_name = Pack 320Ah

; Instance VRM — doit être unique sur le GX
device_instance = 142

; Timeout déconnexion (2 × MQTT_INTERVAL)
timeout = 15

; ── Broker MQTT ──────────────────────────────────────────────────────────────
; IP du RPi CM5 (broker Mosquitto Docker — port 1883)
broker_address = 192.168.1.120
broker_port = 1883
topic = santuario/bms/2/venus
username =
password =

; ── Time-To-Go ───────────────────────────────────────────────────────────────
[TIME_TO_GO]
enabled = 1
soc = 10
recalculate_every = 60
