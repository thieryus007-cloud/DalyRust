# =============================================================================
# Mosquitto — Configuration pour DalyBMS
# =============================================================================

# Listener MQTT standard
listener 1883 0.0.0.0

# Listener MQTT over WebSocket (utile pour dashboard JS / Node-RED)
listener 9001
protocol websockets

# Permettre les connexions anonymes (réseau local uniquement)
# En production : configurer allow_anonymous false + password_file
allow_anonymous true

# Persistance des messages (reconnexion propre des clients)
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# QoS max supporté
max_qos 2

# Taille max d'un message (1 MB suffisant pour les snapshots JSON BMS)
message_size_limit 1048576

# =============================================================================
# Bridge MQTT — NanoPi Neo3 (Venus OS) ↔ Pi5
# Pont bidirectionnel pour les topics Venus OS et Shelly
# NanoPi : 192.168.1.120:1883
# =============================================================================

connection nanopi-venus-bridge
address 192.168.1.120:1883
start_type automatic
try_private false
cleansession false
restart_timeout 30

# Venus OS data — lecture depuis NanoPi (N/ = données publiées par Venus)
topic N/c0619ab9929a/# in 0

# Venus OS commandes — écriture vers NanoPi (W/ = commandes pour Venus)
topic W/c0619ab9929a/# out 0

# Venus OS keepalive — requêtes de lecture (R/ = demande de valeur fraîche)
topic R/c0619ab9929a/# out 0

# Shelly topics — bidirectionnel (pendant transition avant reconfiguration Shelly)
topic shellypro2pm-ec62608840a4/# both 0
